<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    :root {
      color-scheme: light;
      --bg-top: #dff4ff;
      --bg-bottom: #f7f2e8;
      --card: rgba(255, 255, 255, 0.78);
      --text: #16324f;
      --muted: #4f6b82;
      --shadow: rgba(22, 50, 79, 0.18);
      --border: rgba(255, 255, 255, 0.7);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 38%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    }

    .card {
      width: min(920px, 100%);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 60px var(--shadow);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.1;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .image-frame {
      margin-top: 22px;
      overflow: hidden;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: inset 0 0 0 1px rgba(22, 50, 79, 0.08);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

  </style>
</head>
<body>
  <main class="card">
    <section class="image-frame">
      <img id="hero-image" alt="">
    </section>
  </main>

  <script>
    async function loadImage() {
      const image = document.getElementById('hero-image');

      try {
        const response = await fetch('./0.jpg');

        if (!response.ok) {
          throw new Error('HTTP ' + response.status);
        }

        const buffer = await response.arrayBuffer();
        const blob = new Blob([buffer], { type: 'image/gif' });
        image.src = URL.createObjectURL(blob);
      } catch (error) {
        console.error(error);
      }
    }

    loadImage();
  </script>
</body>
</html>
